name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Swift version
        run: swift --version

      - name: Run tests
        run: swift test

      - name: Build app bundle
        run: ./scripts/build.sh

      - name: Create zip archive
        run: cd dist && zip -r "../WordsHunter-macOS-${GITHUB_REF_NAME}.zip" "Words Hunter.app"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$GITHUB_REF_NAME" "WordsHunter-macOS-${GITHUB_REF_NAME}.zip"

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: npm install

      - name: Build Tauri app
        run: npm run tauri:build

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          INSTALLER=$(find src-tauri/target/release/bundle/nsis -name '*.exe' | head -1)
          BASENAME="WordsHunter-Windows-${GITHUB_REF_NAME}-setup.exe"
          cp "$INSTALLER" "$BASENAME"
          gh release upload "$GITHUB_REF_NAME" "$BASENAME"
